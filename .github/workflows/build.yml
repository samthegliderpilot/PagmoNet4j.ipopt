name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:/vcpkg --depth 1
          C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-windows-ipopt-${{ hashFiles('pagmoNet/ports/**', 'ports/**', 'pagmoWrapper/CMakeLists.txt') }}
          restore-keys: vcpkg-windows-ipopt-

      - name: Build native with IPOPT
        run: pwsh scripts/build-native.ps1 -Configuration Release
        shell: pwsh

      - name: Build and test
        env:
          PAGMO4J_NATIVE_DIR: ${{ github.workspace }}/pagmoWrapper/win-build
        run: ./gradlew test
        shell: pwsh

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential swig curl zip unzip tar \
            autoconf autoconf-archive automake libtool powershell

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg --depth 1
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-linux-ipopt-${{ hashFiles('pagmoNet/ports/**', 'ports/**', 'pagmoWrapper/CMakeLists.txt') }}
          restore-keys: vcpkg-linux-ipopt-

      - name: Build native with IPOPT
        run: pwsh scripts/build-native.ps1 -Configuration Release

      - name: Build and test
        env:
          PAGMO4J_NATIVE_DIR: ${{ github.workspace }}/pagmoWrapper/build
        run: ./gradlew test

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install build tools
        run: brew install autoconf autoconf-archive automake libtool swig powershell

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg --depth 1
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-macos-ipopt-${{ hashFiles('pagmoNet/ports/**', 'ports/**', 'pagmoWrapper/CMakeLists.txt') }}
          restore-keys: vcpkg-macos-ipopt-

      - name: Build native with IPOPT
        run: pwsh scripts/build-native.ps1 -Configuration Release

      - name: Build and test
        env:
          PAGMO4J_NATIVE_DIR: ${{ github.workspace }}/pagmoWrapper/build
        run: ./gradlew test
